// ---------------------- QUIZLOGIK ----------------------

let selectedQuestions = [];
let currentQuestion = 0;
let score = 0;

function shuffle(array){
return array.sort(()=>Math.random()-0.5);
}

function startQuiz(){
selectedQuestions = shuffle([...questions]).slice(0,10);
currentQuestion=0;
score=0;
showQuestion();
}

function showQuestion(){
const quizDiv=document.getElementById("quiz");
quizDiv.innerHTML="";

if(currentQuestion>=selectedQuestions.length){
showResult();
return;
}

let q=selectedQuestions[currentQuestion];

let progress=document.createElement("div");
progress.className="progress";
progress.innerText="Frage "+(currentQuestion+1)+" von 10";
quizDiv.appendChild(progress);

let question=document.createElement("div");
question.className="question";
question.innerText=q.question;
quizDiv.appendChild(question);

let shuffledAnswers=shuffle([...q.answers]);

shuffledAnswers.forEach(answer=>{
let btn=document.createElement("button");
btn.className="answer-btn";
btn.innerText=answer.text;
btn.onclick=()=>selectAnswer(btn,answer,q);
quizDiv.appendChild(btn);
});
}

function selectAnswer(button,answer,q){
let buttons=document.querySelectorAll(".answer-btn");
buttons.forEach(b=>b.disabled=true);

if(answer.correct){
button.classList.add("correct");
score++;
}else{
button.classList.add("wrong");
buttons.forEach(b=>{
if(b.innerText===q.answers.find(a=>a.correct).text){
b.classList.add("correct");
}
});
}

let feedback=document.createElement("div");
feedback.className="feedback";
feedback.innerText=answer.explanation;
document.getElementById("quiz").appendChild(feedback);

let next=document.createElement("button");
next.className="next-btn";
next.innerText="Weiter";
next.onclick=()=>{
currentQuestion++;
showQuestion();
};
document.getElementById("quiz").appendChild(next);
}

function showResult(){
let percent=Math.round((score/10)*100);
let level="";
if(percent>=90){level="Sehr gut vorbereitet – oberes Prüfungsniveau";}
else if(percent>=75){level="Gut vorbereitet – kleinere Schwächen analysieren";}
else if(percent>=60){level="Solide Grundlagen – gezielte Vertiefung empfohlen";}
else if(percent>=40){level="Deutliche Lücken – Wiederholung notwendig";}
else{level="Dringender Handlungsbedarf";}

document.getElementById("quiz").innerHTML=`
<div class="result">
<h2>Ergebnis</h2>
<p><strong>${score}/10 richtig</strong></p>
<p>${percent}%</p>
<p>${level}</p>
<p>Analysiere insbesondere Rechenwege, Incoterms-Logik und Kostenstrukturfragen. Die IHK prüft vor allem Entscheidungsfähigkeit und saubere Anwendung von Fachbegriffen.</p>
<button class="next-btn" onclick="startQuiz()">Neues Quiz starten</button>
<div class="footer-icons">🚢 ✈️ 📦 🏢</div>
</div>
`;
}

startQuiz();
</script>
